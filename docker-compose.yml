version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: qzmotor_mysql
    restart: always
    environment:
      MYSQL_DATABASE: qzmotorcenter
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-app:
    build: .
    container_name: qzmotor_auth_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_URL=jdbc:mysql://mysql-db:3306/qzmotorcenter?allowPublicKeyRetrieval=true&useSSL=false
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - JWT_SECRET=QZEsteEsElPoderDeLaAmistad110407082708@
      - JWT_EXPIRATION=3600000
      - JWT_REFRESH_EXPIRATION=604800000
    depends_on:
      mysql-db:
        condition: service_healthy

volumes:
  mysql_data:
